<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>検索</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .item { margin-bottom: 20px; cursor: pointer; }
  img { width: 120px; }
</style>
</head>
<body>

<h1>検索</h1>

<input id="keyword" type="text" placeholder="作品名を入力">
<button onclick="search()">検索</button>

<div id="results"></div>

<script>
async function search() {
  const keyword = document.getElementById("keyword").value;
  const url = `/worker?mode=index&keyword=${encodeURIComponent(keyword)}`;

  const res = await fetch(url);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!data.result || !data.result.items) {
    container.innerHTML = "検索結果なし";
    return;
  }

  data.result.items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <img src="${item.imageURL.large}" />
      <div>${item.title}</div>
    `;
    div.onclick = () => {
      // series.html に遷移
      window.location.href = `series.html?keyword=${encodeURIComponent(keyword)}`;
    };
    container.appendChild(div);
  });
}
</script>

</body>
</html>
