<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>検索</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .item { margin-bottom: 20px; cursor: pointer; }
  img { width: 120px; }
  .credit { margin-top: 40px; font-size: 12px; color: #666; }
</style>
</head>
<body>

<h1>検索</h1>

<input id="keyword" type="text" placeholder="作品名を入力">
<button onclick="search()">検索</button>

<div id="results"></div>

<!-- DMM クレジット（全ページ必須） -->
<div class="credit">
  Powered by <a href="https://affiliate.dmm.com/api/" target="_blank">DMM.com Webサービス</a>
</div>

<script>
async function search() {
  const keyword = document.getElementById("keyword").value.trim();
  if (!keyword) return;

  // ★ Cloudflare Worker の絶対 URL を使用
  const url = `https://dmm-api.nobidigi.workers.dev/?mode=index&keyword=${encodeURIComponent(keyword)}`;

  let res;
  try {
    res = await fetch(url);
  } catch (e) {
    document.getElementById("results").innerHTML = "Worker に接続できません。";
    return;
  }

  const data = await res.json();
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!data.result || !data.result.items) {
    container.innerHTML = "検索結果なし";
    return;
  }

  data.result.items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <img src="${item.imageURL.large}" />
      <div>${item.title}</div>
    `;
    div.onclick = () => {
      window.location.href = `series.html?keyword=${encodeURIComponent(keyword)}`;
    };
    container.appendChild(div);
  });
}
</script>

</body>
</html>
