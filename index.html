<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DMM作品一覧</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }
    .item {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 8px;
      background: #fafafa;
    }
    .item img {
      width: 100%;
      border-radius: 6px;
    }
    .title {
      font-size: 14px;
      margin-top: 8px;
      font-weight: bold;
    }
    .link {
      display: block;
      margin-top: 6px;
      color: #0070f3;
    }
  </style>
</head>
<body>

  <h1>DMM作品一覧（検索：ワンピース）</h1>

  <div id="list" class="grid">読み込み中...</div>

  <script>
    fetch("https://dmm-api.nobidigi.workers.dev/?keyword=ワンピース")
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = ""; // 初期化

        data.result.items.forEach(item => {
          const div = document.createElement("div");
          div.className = "item";

          div.innerHTML = `
            <img src="${item.imageURL?.large || ''}" alt="">
            <div class="title">${item.title}</div>
            <a class="link" href="${item.affiliateURL}" target="_blank">作品ページへ</a>
          `;

          list.appendChild(div);
        });
      });
  </script>

</body>
</html>
