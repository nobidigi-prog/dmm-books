<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シリーズ一覧</title>

  <style>
    body { font-family: sans-serif; padding: 20px; }

    h1 { margin-bottom: 10px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .item {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 8px;
      background: #fafafa;
    }

    .item img {
      width: 100%;
      border-radius: 6px;
    }

    .title {
      font-size: 14px;
      margin-top: 8px;
      font-weight: bold;
    }

    .link {
      display: block;
      margin-top: 6px;
      color: #0070f3;
    }
  </style>
</head>

<body>

  <h1 id="page-title">読み込み中...</h1>

  <div id="list" class="grid"></div>

  <script>
    /* -------------------------
       URLパラメータ取得
    ------------------------- */
    const params = new URLSearchParams(location.search);
    const seriesName = params.get("name");
    const authorName = params.get("author");

    /* -------------------------
       API検索
    ------------------------- */
    function searchSeries(keyword) {
      document.getElementById("list").innerHTML = "読み込み中...";

      fetch(`https://dmm-api.nobidigi.workers.dev/?keyword=${encodeURIComponent(keyword)}`)
        .then(res => res.json())
        .then(data => {
          const items = data.result.items;
          renderList(items);
        });
    }

    /* -------------------------
       作品一覧描画
    ------------------------- */
    function renderList(items) {
      const list = document.getElementById("list");
      list.innerHTML = "";

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <a href="detail.html?cid=${item.content_id}">
            <img src="${item.imageURL?.large || ''}">
          </a>

          <div class="title">${item.title}</div>

          <a class="link" href="${item.affiliateURL.replace('pinupgirl-990','pinupgirl-001')}" target="_blank">
            DMMで見る
          </a>
        `;

        list.appendChild(div);
      });
    }

    /* -------------------------
       ページタイトル設定 & 検索実行
    ------------------------- */
    if (seriesName) {
      document.getElementById("page-title").textContent = `シリーズ：${seriesName}`;
      searchSeries(seriesName);
    } else if (authorName) {
      document.getElementById("page-title").textContent = `作者：${authorName}`;
      searchSeries(authorName);
    } else {
      document.getElementById("page-title").textContent = "シリーズ名または作者名が指定されていません";
    }
  </script>

  <footer style="margin-top:40px; text-align:center; font-size:14px; color:#666;">
    Powered by <a href="https://affiliate.dmm.com/api/" target="_blank">DMM.com Webサービス</a>
  </footer>

</body>
</html>
