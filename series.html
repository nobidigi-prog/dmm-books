<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シリーズ一覧</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .item { margin-bottom: 20px; }
  img { width: 120px; }
  .credit { margin-top: 40px; font-size: 12px; color: #666; }
</style>
</head>
<body>

<h1>シリーズ一覧</h1>

<div id="results"></div>

<!-- DMM クレジット（全ページ必須） -->
<div class="credit">
  Powered by <a href="https://affiliate.dmm.com/api/" target="_blank">DMM.com Webサービス</a>
</div>

<script>
async function loadSeries() {
  const params = new URLSearchParams(window.location.search);
  const keyword = params.get("keyword");

  if (!keyword) {
    document.getElementById("results").innerHTML = "キーワードがありません";
    return;
  }

  const url = `./worker?mode=product&keyword=${encodeURIComponent(keyword)}`;

  let res;
  try {
    res = await fetch(url);
  } catch (e) {
    document.getElementById("results").innerHTML = "Worker に接続できません。";
    return;
  }

  const data = await res.json();
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!data.result || !data.result.items) {
    container.innerHTML = "シリーズが見つかりません";
    return;
  }

  data.result.items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <img src="${item.imageURL.large}" />
      <div>${item.title}</div>
    `;
    container.appendChild(div);
  });
}

loadSeries();
</script>

</body>
</html>
