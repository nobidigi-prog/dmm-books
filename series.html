<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>シリーズ一覧</title>
</head>
<body>
<h1>シリーズ一覧</h1>
<div id="book-list">読み込み中...</div>

<script>
const params = new URLSearchParams(window.location.search);
const seriesId = params.get("series_id");

if (!seriesId) {
  document.getElementById("book-list").innerText = "シリーズIDが指定されていません。";
} else {
  loadSeries(seriesId);
}

async function loadSeries(id) {

  // ★ 正しい Worker URL
  const apiUrl = `https://dmm-api.nobidigi.workers.dev/?series_id=${id}`;

  try {
    const res = await fetch(apiUrl, { cache: "no-store" });

    // ★ ここは JSON のみ（text() は絶対に使わない）
    const data = await res.json();

    if (!data || !data.result || !data.result.items) {
      document.getElementById("book-list").innerText = "データが取得できませんでした。";
      return;
    }

    const items = data.result.items;
    const container = document.getElementById("book-list");
    container.innerHTML = "";

items.forEach(item => {
  const title = item.title || "タイトル不明";
  const image = item.imageURL?.large || item.imageURL?.small || "";
  const author = item.iteminfo?.author?.[0]?.name || "著者情報なし";

  // ★ ここが重要
  const cid = item.cid || item.product_id;

  const card = document.createElement("div");
  card.innerHTML = `
    <h3>${title}</h3>
    <img src="${image}" width="120">
    <p>${author}</p>
    <a href="detail.html?cid=${cid}">作品ページへ</a>
  `;
  container.appendChild(card);
});

  } catch (e) {
    console.error(e);
    document.getElementById("book-list").innerText = "エラーが発生しました。";
  }
}
</script>
</body>
</html>
