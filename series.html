<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>シリーズ一覧</title>
</head>
<body>
<h1>シリーズ一覧</h1>
<div id="book-list">読み込み中...</div>

<script>
const params = new URLSearchParams(window.location.search);
const seriesId = params.get("series_id");

if (!seriesId) {
  document.getElementById("book-list").innerText = "シリーズIDが指定されていません。";
} else {
  loadSeries(seriesId);
}

async function loadSeries(id) {
  try {
    // ① series_id で Worker に問い合わせ（シリーズ名を取得）
    const firstUrl = `https://dmm-api.nobidigi.workers.dev/?series_id=${id}`;
    const firstRes = await fetch(firstUrl, { cache: "no-store" });
    const firstData = await firstRes.json();

    if (!firstData?.result?.items?.length) {
      document.getElementById("book-list").innerText = "シリーズ情報が取得できませんでした。";
      return;
    }

    // ② 最初の作品からシリーズ名を取得
    const firstItem = firstData.result.items[0];
    const seriesName = firstItem.series_name;

    if (!seriesName) {
      document.getElementById("book-list").innerText = "シリーズ名が取得できませんでした。";
      return;
    }

    // ③ シリーズ名で再検索（本番のシリーズ一覧）
    const apiUrl = `https://dmm-api.nobidigi.workers.dev/?series_name=${encodeURIComponent(seriesName)}`;
    const res = await fetch(apiUrl, { cache: "no-store" });
    const data = await res.json();

    if (!data?.result?.items) {
      document.getElementById("book-list").innerText = "シリーズ作品が取得できませんでした。";
      return;
    }

    const items = data.result.items;
    const container = document.getElementById("book-list");
    container.innerHTML = "";

    // ④ シリーズ一覧を描画
    items.forEach(item => {
      const title = item.title || "タイトル不明";
      const image = item.imageURL?.large || item.imageURL?.small || "";
      const author = item.iteminfo?.author?.[0]?.name || "著者情報なし";
      const cid = item.cid || item.product_id;

      const card = document.createElement("div");
      card.innerHTML = `
        <h3>${title}</h3>
        <img src="${image}" width="120">
        <p>${author}</p>
        <a href="detail.html?cid=${cid}">作品ページへ</a>
      `;
      container.appendChild(card);
    });

  } catch (e) {
    console.error(e);
    document.getElementById("book-list").innerText = "エラーが発生しました。";
  }
}
</script>
</body>
</html>
