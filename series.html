<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シリーズ一覧</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .item { margin-bottom: 20px; }
  img { width: 120px; }
</style>
</head>
<body>

<h1>シリーズ一覧</h1>

<div id="results"></div>

<script>
async function loadSeries() {
  const params = new URLSearchParams(window.location.search);
  const keyword = params.get("keyword");

  if (!keyword) {
    document.getElementById("results").innerHTML = "キーワードがありません";
    return;
  }

  // Worker に product モードで問い合わせ
  const url = `/worker?mode=product&keyword=${encodeURIComponent(keyword)}`;
  const res = await fetch(url);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!data.result || !data.result.items) {
    container.innerHTML = "シリーズが見つかりません";
    return;
  }

  data.result.items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <img src="${item.imageURL.large}" />
      <div>${item.title}</div>
    `;
    container.appendChild(div);
  });
}

loadSeries();
</script>

</body>
</html>
