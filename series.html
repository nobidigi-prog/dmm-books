<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>シリーズ一覧</title>
</head>
<body>
<h1>シリーズ一覧</h1>
<div id="book-list">読み込み中...</div>

<script>
const params = new URLSearchParams(window.location.search);
const seriesId = params.get("series_id");

if (!seriesId) {
  document.getElementById("book-list").innerText = "シリーズIDが指定されていません。";
} else {
  loadSeries(seriesId);
}

async function loadSeries(id) {
  const apiUrl = `https://dmm-worker.nobidigi.workers.dev/?series_id=${id}`;

  try {
    const res = await fetch(apiUrl, { cache: "no-store" });

    // ★ ここを一旦テキストモードにする
    const text = await res.text();
    console.log(text);
    document.getElementById("book-list").innerText = "レスポンスをコンソールに出力しました。";

  } catch (e) {
    console.error(e);
    document.getElementById("book-list").innerText = "エラーが発生しました。";
  }
}
</script>
</body>
</html>
