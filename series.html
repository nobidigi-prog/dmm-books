<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シリーズ一覧</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      line-height: 1.7;
    }

    .series-header {
      margin-bottom: 30px;
    }

    .series-title {
      font-size: 28px;
      font-weight: bold;
    }

    .series-author {
      font-size: 16px;
      color: #555;
      margin-top: 5px;
    }

    .volume-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .volume-card {
      background: #ffffff;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .volume-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    .volume-img {
      width: 100%;
      height: 240px;
      background: #e0e0e0;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .volume-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .volume-info {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .buy-btn {
      display: inline-block;
      background: #ff5722;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }

    .buy-btn:hover {
      background: #e64a19;
    }

    footer {
      margin-top: 60px;
      font-size: 14px;
      color: #666;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="series-header">
    <div class="series-title" id="seriesTitle">シリーズ名</div>
    <div class="series-author" id="seriesAuthor">著者名</div>
  </div>

  <div class="volume-grid" id="volumeList">
    <!-- JS で自動生成 -->
  </div>

  <footer>
    Powered by <a href="https://affiliate.dmm.com/api/" target="_blank">DMM.com Webサービス</a>
  </footer>

  <script>
    async function loadSeries() {
      const url = new URL(location.href);
      const keyword = url.searchParams.get("keyword") || "";

      // ★ 必ずあなたの Worker URL に変更してください
      const apiUrl = `https://your-worker-url.workers.dev/?mode=product&keyword=${encodeURIComponent(keyword)}`;

      const res = await fetch(apiUrl);
      const data = await res.json();

      if (!data.result || !data.result.items) {
        document.getElementById("seriesTitle").innerText = "作品が見つかりませんでした";
        return;
      }

      const items = data.result.items;

      // シリーズ名・著者名
      const first = items[0];
      document.getElementById("seriesTitle").innerText = first.title || "シリーズ名";
      document.getElementById("seriesAuthor").innerText = first.author || "";

      // 巻一覧
      const list = document.getElementById("volumeList");
      list.innerHTML = "";

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "volume-card";

        div.innerHTML = `
          <div class="volume-img"></div>
          <div class="volume-title">${item.title}</div>
          <div class="volume-info">
            発売日：${item.date || "不明"}<br>
            価格：${item.price || "不明"}円
          </div>
          <a class="buy-btn" href="${item.URL}" target="_blank">購入する</a>
        `;

        list.appendChild(div);
      });
    }

    loadSeries();
  </script>

</body>
</html>
