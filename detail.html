<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>作品詳細</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    img { max-width: 300px; border-radius: 8px; }
    .title { font-size: 24px; font-weight: bold; margin-top: 10px; }
    .info { margin-top: 10px; font-size: 16px; color: #555; }
    .desc { margin-top: 15px; line-height: 1.7; }
    .price { margin-top: 10px; font-size: 20px; color: #d00; }
    .link {
      margin-top: 20px;
      display: inline-block;
      font-size: 20px;
      color: #0070f3;
      padding: 10px 15px;
      border: 1px solid #0070f3;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div id="content">読み込み中...</div>

<script>
const params = new URLSearchParams(window.location.search);
const cid = params.get("cid");

if (!cid) {
  document.getElementById("content").innerText = "CID が指定されていません。";
} else {
  loadDetail(cid);
}

async function loadDetail(cid) {
  const apiUrl = `https://dmm-api.nobidigi.workers.dev/?cid=${cid}`;

  try {
    const res = await fetch(apiUrl, { cache: "no-store" });
    const data = await res.json();

    if (!data || !data.result || !data.result.items || data.result.items.length === 0) {
      document.getElementById("content").innerText = "データが取得できませんでした。";
      return;
    }

    const item = data.result.items[0];

    const title = item.title;
    const image = item.imageURL?.large || item.imageURL?.small || "";
    const author = item.iteminfo?.author?.[0]?.name || "著者情報なし";

    document.getElementById("content").innerHTML = `
      <h2>${title}</h2>
      <img src="${image}" width="200">
      <p>${author}</p>
    `;

  } catch (e) {
    console.error(e);
    document.getElementById("content").innerText = "エラーが発生しました。";
  }
}
</script>

<footer style="margin-top:40px; text-align:center; font-size:14px; color:#666;">
  Powered by <a href="https://affiliate.dmm.com/api/" target="_blank">DMM.com Webサービス</a>
</footer>
</body>
</html>
